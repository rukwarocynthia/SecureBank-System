<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Funds | SecureBank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #1e293b;
            --accent-blue: #3b82f6;
        }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* Executive Navbar Styling */
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--accent-blue); }
        .nav-logout {
            color: #ef4444 !important;
        }

        /* Form Container */
        .transfer-container { 
            min-height: calc(100vh - 70px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .transfer-card { 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            max-width: 500px; 
            width: 100%;
            border: 1px solid #e2e8f0;
        }
        .account-info-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 5px solid var(--accent-blue);
        }
        .btn-transfer {
            background: var(--accent-blue);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: 0.3s;
        }
        .btn-transfer:hover { background: #2563eb; transform: translateY(-1px); }
    </style>
</head>
<body>

<nav class="navbar-custom">
    <a href="/dashboard" class="nav-logo">
        <i class="fa-solid fa-building-columns text-primary"></i> 
        <span>SecureBank</span>
    </a>
    <ul class="nav-links">
        <li><a href="/dashboard"><i class="fa-solid fa-gauge me-1"></i> Dashboard</a></li>
        <li><a href="/transactions"><i class="fa-solid fa-receipt me-1"></i> History</a></li>
        <li><a href="/logout" class="nav-logout"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</a></li>
    </ul>
</nav>

<div class="transfer-container">
    <div class="transfer-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Transfer Funds</h3>
            <p class="text-muted small">Secure peer-to-peer transfers</p>
        </div>

        <div class="account-info-box">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <small class="text-uppercase text-muted fw-bold" style="font-size: 0.65rem;">Source Account</small>
                    <h6 class="mb-0 fw-bold">{{ sender.account_type }}</h6>
                </div>
                <div class="text-end">
                    <small class="text-uppercase text-muted fw-bold" style="font-size: 0.65rem;">Available</small>
                    <h6 class="mb-0 text-primary fw-bold">KES {{ "{:,.2f}".format(sender.balance) }}</h6>
                </div>
            </div>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small">Recipient</label>
                <select name="receiver" class="form-select" required>
                    <option value="" disabled selected>Search by name...</option>
                    {% for account in receivers %}
                        <option value="{{ account.id }}">
                            {{ account.username }} ({{ account.account_type }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label small">Amount (KES)</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted">KES</span>
                    <input type="number" name="amount" class="form-control border-start-0" 
                           placeholder="0.00" step="0.01" min="1" required>
                </div>
            </div>

            <button type="submit" class="btn btn-transfer shadow-sm">
                Confirm & Send
            </button>
        </form>
        <div class="text-center mt-4">
            <a href="/dashboard" class="text-decoration-none text-muted small">
                <i class="fa-solid fa-arrow-left me-1"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>

</body>
</html>
