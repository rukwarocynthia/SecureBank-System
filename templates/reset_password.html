<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password | SecureBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { border-radius: 12px; }
        .btn-primary { background-color: #3b82f6; border: none; padding: 10px; border-radius: 8px; }
        .btn-primary:hover { background-color: #2563eb; }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary"><i class="fa-solid fa-building-columns me-2"></i>SecureBank</h2>
                </div>
                
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h4 class="text-center fw-bold mb-3">Set New Password</h4>
                        <p class="text-muted text-center small mb-4">Ensure your new password is at least 8 characters long.</p>
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                          {% if messages %}
                            {% for category, message in messages %}
                              <div class="alert alert-{{ category }} alert-dismissible fade show small" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                              </div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form method="POST" id="resetForm">
                            <div class="mb-3">
                                <label class="form-label fw-medium">New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                    <input type="password" name="password" id="password" class="form-control border-start-0" placeholder="••••••••" required minlength="8">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-medium">Confirm New Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-check-double text-muted"></i></span>
                                    <input type="password" name="confirm_password" id="confirm_password" class="form-control border-start-0" placeholder="••••••••" required>
                                </div>
                                <div id="match-message" class="form-text mt-2"></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold">
                                <i class="fa-solid fa-key me-2"></i>Update Password
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('login') }}" class="text-decoration-none small text-muted">
                        <i class="fa-solid fa-arrow-left me-1"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const password = document.getElementById('password');
        const confirm_password = document.getElementById('confirm_password');
        const message = document.getElementById('match-message');
        const form = document.getElementById('resetForm');

        function validatePassword() {
            if (confirm_password.value === '') {
                message.innerHTML = '';
                return;
            }
            
            if (password.value === confirm_password.value) {
                message.style.color = '#16a34a'; // Success green
                message.innerHTML = '<i class="fa-solid fa-circle-check"></i> Passwords match';
            } else {
                message.style.color = '#dc2626'; // Error red
                message.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Passwords do not match';
            }
        }

        password.onchange = validatePassword;
        confirm_password.onkeyup = validatePassword;

        form.onsubmit = function(e) {
            if (password.value !== confirm_password.value) {
                e.preventDefault();
                alert("Passwords do not match!");
                return false;
            }
        };
    </script>
</body>
</html>
